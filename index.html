<!DOCTYPE html>
<html>
<head>
  <base href="/SCOT/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="SCOT TOPAZ - Community Operations Platform">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SCOT TOPAZ">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>SCOT TOPAZ</title>
  <!-- Manifest removed to prevent PWA install prompts on mobile browsers -->
  <!-- <link rel="manifest" href="manifest.json"> -->
  <script src="pdfjs/pdf.min.js"></script>
  <script type="text/javascript">
    pdfjsLib.GlobalWorkerOptions.workerSrc = "pdfjs/pdf.worker.min.js";
  </script>
</head>
<body>
  <div id="error-console" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.95); color:#f87171; padding:24px; font-family:Consolas, monospace; z-index:999999; overflow:auto; font-size:14px; line-height:1.6; border:4px solid #ef4444;">
    <h3 style="color:#ef4444; margin-top:0; border-bottom:1px solid #ef4444; padding-bottom:8px; font-size:18px;">SCOT WEB DIAGNOSTICS CONSOLE</h3>
    <pre id="error-console-pre" style="white-space:pre-wrap; word-break:break-all; margin:0;"></pre>
  </div>
  <script>
    window.addEventListener('error', function(event) {
      var consoleEl = document.getElementById('error-console');
      var preEl = document.getElementById('error-console-pre');
      if (consoleEl && preEl) {
        consoleEl.style.display = 'block';
        preEl.textContent += '\n[ERROR] ' + event.message + '\nURL: ' + event.filename + ':' + event.lineno + ':' + event.colno + '\n' + (event.error ? event.error.stack : '') + '\n';
      }
    });
    window.addEventListener('unhandledrejection', function(event) {
      var consoleEl = document.getElementById('error-console');
      var preEl = document.getElementById('error-console-pre');
      if (consoleEl && preEl) {
        consoleEl.style.display = 'block';
        var reasonText = event.reason;
        if (event.reason && typeof event.reason === 'object') {
          reasonText = event.reason.message || JSON.stringify(event.reason);
        }
        preEl.textContent += '\n[UNHANDLED REJECTION] ' + reasonText + '\n' + (event.reason && event.reason.stack ? event.reason.stack : '') + '\n';
      }
    });
  </script>
  <!-- Loading indicator shown while Flutter engine boots -->
  <style>
    body { margin: 0; padding: 0; overflow: hidden; }
    .loading-container {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4f46e5 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: white;
      z-index: 99999;
      transition: opacity 0.5s ease;
    }
    .loading-container.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid #a78bfa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 16px; opacity: 0.8; }
  </style>
  <div id="loading" class="loading-container">
    <div class="spinner"></div>
    <div class="loading-text">Loading SCOT TOPAZ...</div>
  </div>

  <script>
    // Hide loading spinner with fade animation
    function hideLoading() {
      var el = document.getElementById('loading');
      if (el && !el.classList.contains('fade-out')) {
        el.classList.add('fade-out');
        setTimeout(function() { el.remove(); }, 600);
      }
    }

    // Strategy 1: Watch for Flutter adding a <flt-glass-pane> or <flutter-view> to the DOM
    var observer = new MutationObserver(function(mutations) {
      for (var i = 0; i < mutations.length; i++) {
        for (var j = 0; j < mutations[i].addedNodes.length; j++) {
          var node = mutations[i].addedNodes[j];
          if (node.tagName && (
              node.tagName.startsWith('FLT-') ||
              node.tagName === 'FLUTTER-VIEW' ||
              node.tagName === 'FLUTTER-GLASS-PANE'
          )) {
            hideLoading();
            observer.disconnect();
            return;
          }
        }
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });

    // Strategy 2: Listen for flutter-first-frame (might work in some versions)
    window.addEventListener('flutter-first-frame', hideLoading);

    // Strategy 3: Fallback timeout - hide after 8 seconds no matter what
    setTimeout(hideLoading, 8000);
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
