<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="SCOT TOPAZ - Community Operations Platform">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SCOT TOPAZ">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>SCOT TOPAZ</title>
  <!-- Manifest removed to prevent PWA install prompts on mobile browsers -->
  <!-- <link rel="manifest" href="manifest.json"> -->
</head>
<body>
  <!-- Loading indicator shown while Flutter engine boots -->
  <style>
    .loading-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4f46e5 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: white;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid #a78bfa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 16px; opacity: 0.8; }
  </style>
  <div id="loading" class="loading-container">
    <div class="spinner"></div>
    <div class="loading-text">Loading SCOT TOPAZ...</div>
  </div>
  <script>
    // Remove loading indicator once Flutter app is ready
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      if (loading) loading.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
