name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Java environment for Android build
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Set up Flutter environment
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. Get Flutter dependencies
      - name: Install Dependencies
        working-directory: src
        run: flutter pub get

      # 5. Build Android release APK
      - name: Build APK
        working-directory: src
        run: flutter build apk --release --android-skip-build-dependency-validation

      # 6. Upload APK as Action Artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: scot-platform-release-apk
          path: src/build/app/outputs/flutter-apk/app-release.apk

      # 6.5. Download Local PDF.js for Web Printing
      - name: Download Local PDF.js
        run: |
          mkdir -p src/web/pdfjs
          curl -L -o src/web/pdfjs/pdf.min.js https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.2.146/pdf.min.js
          curl -L -o src/web/pdfjs/pdf.worker.min.js https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.2.146/pdf.worker.min.js

      # 7. Build Flutter Web
      - name: Build Web
        working-directory: src
        run: flutter build web --release --base-href "/SCOT/" --pwa-strategy=none --tree-shake-icons



      # 8. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        if: github.event_name == 'push'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: src/build/web
          branch: gh-pages
