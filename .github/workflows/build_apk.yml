name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Java environment for Android build
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Set up Flutter environment
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. Get Flutter dependencies
      - name: Install Dependencies
        working-directory: src
        run: flutter pub get

      # 5. Build Android release APK
      - name: Build APK
        working-directory: src
        run: flutter build apk --release

      # 6. Upload APK as Action Artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: scot-platform-release-apk
          path: src/build/app/outputs/flutter-apk/app-release.apk
